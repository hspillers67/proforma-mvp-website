kind = "web"
previewPath = "/"
title = "ProForma MVP Marketing"
version = "1.0.0"
id = "artifacts/proforma-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25150

[services.development]
run = "pnpm --filter @workspace/proforma-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/proforma-site", "run", "build" ]
publicDir = "artifacts/proforma-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25150"
BASE_PATH = "/"
