    <!-- LocalBusiness Structured Data -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": "Proforma MVP Marketing",
  "url": "https://www.proformamvpmarketing.com",
  "logo": "https://www.proformamvpmarketing.com/favicon.svg",
  "description": "Houston-area promotional products, branded apparel, printing and signage, company stores, and trade show products. One local contact backed by Proforma's national buying power.",
  "telephone": "+1-281-849-1508",
  "email": "info.mvp@proforma.com",
  "priceRange": "$$",
  "image": "https://www.proformamvpmarketing.com/og-image.png",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Katy",
    "addressRegion": "TX",
    "addressCountry": "US"
  },
  "areaServed": [
    "Houston, TX",
    "Katy, TX",
    "Sugar Land, TX",
    "Cypress, TX",
    "The Woodlands, TX",
    "Spring, TX",
    "Richmond, TX",
    "Rosenberg, TX",
    "Pearland, TX",
    "La Porte, TX",
    "Baytown, TX",
    "Texas City, TX",
    "Galveston, TX",
    "League City, TX"
  ],
  "openingHoursSpecification": [
    {
      "@type": "OpeningHoursSpecification",
      "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
      "opens": "08:00",
      "closes": "17:00"
    }
  ],
  "founder": {
    "@type": "Person",
    "name": "Holly Spillers"
  }
}

  </head>
  <body>
    <!-- Hidden form for Netlify's build-time crawler to detect -->
    <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="name" />
      <input name="email" />
      <input name="company" />
      <input name="phone" />
      <input name="projectType" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
